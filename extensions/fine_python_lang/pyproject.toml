[project]
name = "fine_python_lang"
version = "0.1.0a1"
description = ""
authors = [{ name = "Vladyslav Hnatiuk", email = "aders1234@gmail.com" }]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "finecode_extension_api~=0.4.0a0",
    "fine_format~=0.1.0a0",
    "fine_code_hierarchy~=0.1.0a0",
    "fine_symbol_info~=0.1.0a0",
    "fine_src_artifacts~=0.1.0a0",
    "fine_lint~=0.1.0a0",
    "fine_type_check~=0.1.0a0",
    "fine_check_imports~=0.1.0a0",
    "fine_semantic_tokens~=0.1.0a0",
    "fine_inlay_hints~=0.1.0a0",
]

[dependency-groups]
dev_workspace = ["finecode~=0.4.0a0", "finecode_dev_common_preset~=0.3.0a0"]

[tool.finecode]
presets = [{ source = "finecode_dev_common_preset" }]

[tool.finecode.env.testing]
interpreters = ["cpython@3.11", "cpython@3.12", "cpython@3.13", "cpython@3.14"] # generated by sync_toolchains from requires-python -- run sync_toolchains to update
[tool.setuptools]
packages = ["fine_python_lang"]
