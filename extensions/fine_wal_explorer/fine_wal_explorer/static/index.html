<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WAL Explorer — Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
  <span class="brand">WAL Explorer</span>
  <a href="/" class="active">Dashboard</a>
  <a href="/runs.html">Runs</a>
  <a href="/events.html">Events</a>
  <a href="/health.html">Health</a>
</nav>
<div class="page">
  <h1>Dashboard</h1>
  <div class="toolbar">
    <button id="refreshIngestBtn" type="button">Refresh Data</button>
    <label>
      Since (ISO)
      <input type="text" id="sinceTs" placeholder="optional, e.g. 2026-01-01T00:00:00Z">
    </label>
    <label>
      <input type="checkbox" id="autoRefresh"> Auto-refresh (5 s)
    </label>
    <span id="lastUpdated"></span>
  </div>
  <p id="ingestStatus" class="msg"></p>
  <div id="cards" class="cards"></div>
  <h2>Recent Runs</h2>
  <div id="content"><p class="msg">Loading…</p></div>
</div>
<script>
function badge(status) {
  const cls = status === 'success' ? 'success' : status === 'failed' ? 'failed' : 'incomplete';
  return `<span class="badge badge-${cls}">${status ?? '—'}</span>`;
}

function fmtMs(ms) {
  if (ms == null) return '—';
  if (ms < 1000) return ms + ' ms';
  return (ms / 1000).toFixed(2) + ' s';
}

function fmtTs(ts) {
  if (!ts) return '—';
  try {
    const d = new Date(ts);
    const p = (n, z = 2) => String(n).padStart(z, '0');
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ` +
           `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}.${p(d.getMilliseconds(), 3)}`;
  } catch { return ts; }
}

async function load() {
  const [mRes, rRes] = await Promise.all([
    fetch('/metrics'),
    fetch('/runs?limit=10'),
  ]);
  if (!mRes.ok || !rRes.ok) throw new Error('API error');
  const metrics = await mRes.json();
  const { runs } = await rRes.json();

  document.getElementById('cards').innerHTML = [
    ['Total Events',   metrics.total_events ?? '—'],
    ['Total Runs',     metrics.total_runs ?? '—'],
    ['Failed Runs',    metrics.failed_runs ?? '—'],
    ['p50 Duration',   fmtMs(metrics.p50_duration_ms)],
    ['p95 Duration',   fmtMs(metrics.p95_duration_ms)],
  ].map(([label, value]) => `
    <div class="card">
      <div class="label">${label}</div>
      <div class="value">${value}</div>
    </div>`).join('');

  const rows = runs.map(r => `
    <tr>
      <td><a href="/run.html?run_id=${encodeURIComponent(r.run_id)}">${r.run_id}</a></td>
      <td>${r.source_id ?? '—'}</td>
      <td>${r.action_name ?? '—'}</td>
      <td>${badge(r.status)}</td>
      <td>${fmtMs(r.duration_ms)}</td>
      <td>${r.event_count ?? '—'}</td>
      <td>${fmtTs(r.first_ts)}</td>
    </tr>`).join('');

  document.getElementById('content').innerHTML = runs.length === 0
    ? '<p class="msg">No runs found.</p>'
    : `<div class="table-wrap"><table>
        <thead><tr>
          <th>Run ID</th><th>Source</th><th>Action</th>
          <th>Status</th><th>Duration</th><th>Events</th><th>Started</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;

  document.getElementById('lastUpdated').textContent =
    'Updated ' + new Date().toLocaleTimeString();
}

function setIngestStatus(text, isError = false) {
  const status = document.getElementById('ingestStatus');
  status.textContent = text;
  status.className = isError ? 'msg msg-error' : 'msg';
}

async function ingestNow() {
  const button = document.getElementById('refreshIngestBtn');
  const sinceTs = document.getElementById('sinceTs').value.trim();
  button.disabled = true;
  setIngestStatus('Ingesting...');

  try {
    const payload = {};
    if (sinceTs !== '') payload.since_ts_iso = sinceTs;

    const res = await fetch('/ingest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    const response = await res.json().catch(() => ({ error: 'Invalid JSON response' }));
    if (!res.ok) {
      throw new Error(response.error || ('HTTP ' + res.status));
    }

    setIngestStatus(
      `Ingest complete: inserted ${response.events_ingested ?? 0}, ` +
      `duplicates ${response.events_skipped_duplicate ?? 0}, ` +
      `failed ${response.events_failed_parse ?? 0}.`
    );
    await load();
  } catch (err) {
    setIngestStatus('Ingest failed: ' + err.message, true);
  } finally {
    button.disabled = false;
  }
}

async function initDashboard() {
  await ingestNow();
}

let timer = null;
document.getElementById('autoRefresh').addEventListener('change', function () {
  if (this.checked) { timer = setInterval(load, 5000); } else { clearInterval(timer); }
});
document.getElementById('refreshIngestBtn').addEventListener('click', ingestNow);

initDashboard().catch(err => {
  document.getElementById('content').innerHTML =
    `<p class="msg msg-error">Error: ${err.message}</p>`;
});
</script>
</body>
</html>
