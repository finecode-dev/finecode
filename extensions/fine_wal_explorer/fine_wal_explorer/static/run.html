<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WAL Explorer — Run Detail</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
  <span class="brand">WAL Explorer</span>
  <a href="/">Dashboard</a>
  <a href="/runs.html">Runs</a>
  <a href="/events.html">Events</a>
  <a href="/health.html">Health</a>
</nav>
<div class="page">
  <a class="back" href="/runs.html">← Back to Runs</a>
  <h1 id="title">Run Detail</h1>
  <div id="runHeader"></div>
  <div id="chart" class="chart-wrap" style="display:none"></div>
  <h2>Events</h2>
  <div id="content"><p class="msg">Loading…</p></div>
</div>
<script src="/static/plotly.min.js"></script>
<script>
function fmtTs(ts) {
  if (!ts) return '—';
  try {
    const d = new Date(ts);
    const p = (n, z = 2) => String(n).padStart(z, '0');
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ` +
           `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}.${p(d.getMilliseconds(), 3)}`;
  } catch { return ts; }
}

function togglePayload(el) {
  const pre = el.nextElementSibling;
  pre.style.display = pre.style.display === 'block' ? 'none' : 'block';
  el.textContent = pre.style.display === 'block' ? '[collapse]' : '[json]';
}

const runId = new URLSearchParams(location.search).get('run_id');
if (!runId) {
  document.getElementById('content').innerHTML =
    '<p class="msg msg-error">No run_id in URL.</p>';
} else {
  document.getElementById('title').textContent = 'Run: ' + runId;
  fetch('/timeline?run_id=' + encodeURIComponent(runId) + '&limit=1000')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(({ events }) => render(events))
    .catch(err => {
      document.getElementById('content').innerHTML =
        `<p class="msg msg-error">Error: ${err.message}</p>`;
    });
}

function render(events) {
  if (!events || events.length === 0) {
    document.getElementById('content').innerHTML = '<p class="msg">No events found.</p>';
    return;
  }

  // ── Run header ────────────────────────────────────────────────
  const first = events[0];
  const last  = events[events.length - 1];
  const fields = [
    ['Action',    first.action_name ?? '—'],
    ['Source',    first.source_id   ?? '—'],
    ['Project',   first.project_path ?? '—'],
    ['Trigger',   first.trigger     ?? '—'],
    ['Started',   fmtTs(first.ts)],
    ['Ended',     fmtTs(last.ts)],
  ];
  document.getElementById('runHeader').innerHTML = `
    <div class="run-header">
      ${fields.map(([l, v]) => `
        <div class="field">
          <div class="label">${l}</div>
          <div class="val">${v}</div>
        </div>`).join('')}
    </div>`;

  // ── Plotly timeline chart ─────────────────────────────────────
  const chartDiv = document.getElementById('chart');
  try {
    // Group events into one trace per unique action_name
    const byAction = {};
    events.forEach(e => {
      const key = e.action_name || '(root)';
      if (!byAction[key]) byAction[key] = { xs: [], ys: [], texts: [] };
      byAction[key].xs.push(e.ts);
      byAction[key].ys.push(key);
      byAction[key].texts.push(
        `<b>${e.event_type}</b><br>${fmtTs(e.ts)}<br>${e.origin_file_path ?? ''}`
      );
    });

    const traces = Object.entries(byAction).map(([name, d]) => ({
      x: d.xs,
      y: d.ys,
      text: d.texts,
      hoverinfo: 'text',
      mode: 'markers',
      type: 'scatter',
      name: name,
      marker: { size: 10 },
    }));

    const layout = {
      margin: { t: 20, b: 40, l: 200, r: 20 },
      height: Math.max(180, Object.keys(byAction).length * 60 + 80),
      xaxis: { title: 'Timestamp', type: 'date' },
      yaxis: { automargin: true },
      legend: { orientation: 'h', y: -0.2 },
      paper_bgcolor: 'transparent',
      plot_bgcolor: '#f9fafb',
    };

    Plotly.newPlot(chartDiv, traces, layout, { responsive: true, displaylogo: false });
    chartDiv.style.display = '';
  } catch (e) {
    chartDiv.style.display = 'none';
  }

  // ── Event table ───────────────────────────────────────────────
  const rows = events.map(e => {
    const hasPayload = e.payload_json && e.payload_json !== 'null';
    const payloadCell = hasPayload
      ? `<span class="payload-toggle" onclick="togglePayload(this)">[json]</span>
         <pre class="payload-full">${escHtml(
           typeof e.payload_json === 'string'
             ? e.payload_json
             : JSON.stringify(e.payload_json, null, 2)
         )}</pre>`
      : '—';
    const origin = e.origin_file_path
      ? `${e.origin_file_path}:${e.origin_line_no ?? ''}`
      : '—';
    return `<tr>
      <td style="white-space:nowrap">${fmtTs(e.ts)}</td>
      <td>${e.event_type ?? '—'}</td>
      <td>${e.action_name ?? '—'}</td>
      <td class="payload-cell">${payloadCell}</td>
      <td style="font-size:0.75rem;color:#6b7280">${origin}</td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="table-wrap"><table>
      <thead><tr>
        <th>Timestamp</th><th>Event Type</th><th>Action</th>
        <th>Payload</th><th>Origin</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
