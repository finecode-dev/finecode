[project]
name = "fine_wal_explorer"
version = "0.1.0a0"
description = "DuckDB-backed WAL ingestion, auto-discovery, and explorer handlers for FineCode"
authors = [{ name = "Vladyslav Hnatiuk", email = "aders1234@gmail.com" }]
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["finecode_extension_api~=0.4.0a0", "fine_wal_events~=0.1.0a0", "duckdb>=1.1.0,<2.0.0"]

[dependency-groups]
dev_workspace = ["finecode~=0.4.0a0", "finecode_dev_common_preset~=0.3.0a0"]

[tool.finecode]
presets = [{ source = "finecode_dev_common_preset" }]

[tool.finecode.env.wal_explorer.dependencies]
fine_wal_explorer = { path = ".", editable = true }
finecode_extension_api = { path = "../../finecode_extension_api", editable = true }


[tool.finecode.env.testing]
interpreters = ["cpython@3.11", "cpython@3.12", "cpython@3.13", "cpython@3.14"] # generated by sync_toolchains from requires-python -- run sync_toolchains to update
[tool.setuptools]
packages = ["fine_wal_explorer"]

[tool.setuptools.package-data]
fine_wal_explorer = ["py.typed", "static/*"]
