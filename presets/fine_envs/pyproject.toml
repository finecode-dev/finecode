[project]
name = "fine_envs"
version = "0.1.0a0"
description = "FineCode preset that owns environment management and configuration action contracts"
authors = [{ name = "Vladyslav Hnatiuk", email = "aders1234@gmail.com" }]
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["finecode_extension_api~=0.4.0a0", "tomlkit==0.11.*", "packaging>=23.0", "fine_src_artifacts~=0.1.0a0"]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-data]
fine_envs = ["preset.toml"]

[tool.setuptools]
packages = ["fine_envs"]
