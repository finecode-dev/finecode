[tool.finecode]
presets = [{ source = "fine_symbol_info" }]


[tool.finecode.action.text_document_hover_python]
source = "fine_python_lang.TextDocumentHoverPythonAction"

[[tool.finecode.action.text_document_hover_python.handlers]]
name = "pyrefly"
source = "fine_python_pyrefly.PyreflyHoverHandler"
env = "dev_no_runtime"
dependencies = ["fine_python_pyrefly[jsonrpc]~=0.2.0a0"]


[tool.finecode.action.text_document_definition_python]
source = "fine_python_lang.TextDocumentDefinitionPythonAction"

[[tool.finecode.action.text_document_definition_python.handlers]]
name = "pyrefly"
source = "fine_python_pyrefly.PyreflyDefinitionHandler"
env = "dev_no_runtime"
dependencies = ["fine_python_pyrefly[jsonrpc]~=0.2.0a0"]


[tool.finecode.action.text_document_references_python]
source = "fine_python_lang.TextDocumentReferencesPythonAction"

[[tool.finecode.action.text_document_references_python.handlers]]
name = "pyrefly"
source = "fine_python_pyrefly.PyreflyReferencesHandler"
env = "dev_no_runtime"
dependencies = ["fine_python_pyrefly[jsonrpc]~=0.2.0a0"]


[tool.finecode.action.text_document_type_definition_python]
source = "fine_python_lang.TextDocumentTypeDefinitionPythonAction"

[[tool.finecode.action.text_document_type_definition_python.handlers]]
name = "pyrefly"
source = "fine_python_pyrefly.PyreflyTypeDefinitionHandler"
env = "dev_no_runtime"
dependencies = ["fine_python_pyrefly[jsonrpc]~=0.2.0a0"]


[tool.finecode.action.text_document_implementation_python]
source = "fine_python_lang.TextDocumentImplementationPythonAction"

[[tool.finecode.action.text_document_implementation_python.handlers]]
name = "pyrefly"
source = "fine_python_pyrefly.PyreflyImplementationHandler"
env = "dev_no_runtime"
dependencies = ["fine_python_pyrefly[jsonrpc]~=0.2.0a0"]


[tool.finecode.action.text_document_document_highlight_python]
source = "fine_python_lang.TextDocumentDocumentHighlightPythonAction"

[[tool.finecode.action.text_document_document_highlight_python.handlers]]
name = "pyrefly"
source = "fine_python_pyrefly.PyreflyDocumentHighlightHandler"
env = "dev_no_runtime"
dependencies = ["fine_python_pyrefly[jsonrpc]~=0.2.0a0"]


[tool.finecode.extension.fine_python_pyrefly]
dependencies_override = ["pyrefly==0.64.*"]


[[tool.finecode.service]]
interface = "finecode_extension_api.interfaces.ijsonrpcclient.IJsonRpcClient"
source = "finecode_jsonrpc.jsonrpc_client.JsonRpcClientImpl"
env = "dev_no_runtime"
dependencies = ["finecode_jsonrpc~=0.1.0a1"]

[[tool.finecode.service]]
interface = "finecode_extension_api.interfaces.ilspclient.ILspClient"
source = "finecode_extension_runner.impls.lsp_client.LspClientImpl"
env = "dev_no_runtime"
dependencies = []
