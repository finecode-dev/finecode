[project]
name = "fine_wal_events"
version = "0.1.0a0"
description = "FineCode preset that owns WAL event ingestion and exploration action contracts"
authors = [{ name = "Vladyslav Hnatiuk", email = "aders1234@gmail.com" }]
readme = "README.md"
requires-python = ">=3.11, < 3.15"
dependencies = ["finecode_extension_api~=0.4.0a0"]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-data]
fine_wal_events = ["preset.toml"]
