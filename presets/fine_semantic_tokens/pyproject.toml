[project]
name = "fine_semantic_tokens"
version = "0.1.0a0"
description = "FineCode preset that owns semantic token action contracts"
authors = [{ name = "Vladyslav Hnatiuk", email = "aders1234@gmail.com" }]
readme = "README.md"
requires-python = ">=3.11, < 3.15"
dependencies = ["finecode_extension_api~=0.4.0a0", "fine_src_artifacts~=0.1.0a0"]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-data]
fine_semantic_tokens = ["preset.toml"]

[tool.setuptools]
packages = ["fine_semantic_tokens"]
