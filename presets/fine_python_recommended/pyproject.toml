[project]
name = "fine_python_recommended"
version = "0.5.0a1"
description = ""
authors = [{ name = "Vladyslav Hnatiuk", email = "aders1234@gmail.com" }]
readme = "README.md"
requires-python = ">=3.11, < 3.15"
dependencies = [
    "fine_python_format~=0.4.0a0",
    "fine_python_lint~=0.5.0a0",
    "fine_python_test~=0.1.0a0",
    "fine_toml_recommended~=0.1.0a0",
]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-data]
fine_python_recommended = ["preset.toml"]

[tool.finecode.deps]
fine_python_format = { path = "../fine_python_format", editable = true }
fine_python_lint = { path = "../fine_python_lint", editable = true }
fine_python_test = { path = "../fine_python_test", editable = true }
fine_toml_recommended = { path = "../fine_toml_recommended", editable = true }
