[project]
name = "fine_python_recommended"
version = "0.5.0a1"
description = ""
authors = [{ name = "Vladyslav Hnatiuk", email = "aders1234@gmail.com" }]
readme = "README.md"
requires-python = ">=3.11, < 3.15"
dependencies = [
    "fine_python_code_hierarchy~=0.1.0a0",
    "fine_python_format~=0.4.0a0",
    "fine_python_lint~=0.5.0a0",
    "fine_python_semantic_tokens~=0.1.0a0",
    "fine_python_symbol_info~=0.1.0a0",
    "fine_python_test~=0.1.0a0",
    "fine_python_type_check~=0.1.0a0",
    "fine_toml_recommended~=0.1.0a0",
]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-data]
fine_python_recommended = ["preset.toml"]


[tool.setuptools]
packages = ["fine_python_recommended"]
