[project]
name = "finecode_extension_runner"
dynamic = ["version"]
description = "Extension runner component for FineCode"
authors = [{ name = "Vladyslav Hnatiuk", email = "aders1234@gmail.com" }]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "loguru==0.7.*",
    "click==8.1.*",
    "finecode_extension_api~=0.4.0a0",
    "deepmerge==2.0.*",
    "debugpy==1.8.*",
    "ordered-set==4.1.*",
    "cattrs==26.1.*",
    "opentelemetry-sdk==1.41.*",
    "opentelemetry-exporter-otlp-proto-grpc==1.41.*",
]

[dependency-groups]
dev_workspace = [
    "finecode~=0.4.0a0",
    "finecode_dev_common_preset~=0.3.0a0",
]
dev = ["debugpy==1.8.*"]

[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.finecode]
presets = [{ source = "finecode_dev_common_preset" }]

[tool.finecode.env.testing]
interpreters = ["cpython@3.11", "cpython@3.12", "cpython@3.13", "cpython@3.14"] # generated by sync_toolchains from requires-python -- run sync_toolchains to update
[tool.importlinter]
root_package = "finecode_extension_runner"
include_external_packages = true
contract_types = ["domain_purity: fine_python_import_linter.contracts.DomainPurityContract"]

# NOTE (KG conformance project, Part A — 2026-06-10): extended the original 3-layer
# contract (er_server -> services -> domain) to include the `_services` and `di` tiers
# that sit between `services` and `domain`. `_services` and `di` are grouped (non-
# independent `:`) because they import each other by design (di.bootstrap wires
# _services.run_action into the registry, which _services then resolves). `impls/` is
# intentionally OUT of the layered stack: domain.py imports a default impl
# (impls.process_executor), so impls cannot sit cleanly above domain — see
# docs/part-a-rationale.md OPEN QUESTIONS. PENDING HUMAN SIGN-OFF.
[[tool.importlinter.contracts]]
id = "er-layered"
name = "ER layered architecture"
type = "layers"
containers = ["finecode_extension_runner"]
layers = [
    "er_server",
    "services",
    "_services : di",
    "domain",
]

# er_errors.py is the ER's shared exception vocabulary, used by both the top infra layer
# (er_server.py, which legitimately talks JSON-RPC) and mid-layers (e.g.
# impls/project_action_runner.py). It must depend only on itself and the standard
# library — an exception here that imports a transport package to carry a wire-protocol
# detail couples the shared vocabulary to one specific protocol. Scoped to er_errors.py
# rather than the full `domain` layer because domain.py has a separate, pre-existing,
# already-flagged exception (it imports impls.process_executor — see the er-layered
# contract's note above); that is an unrelated question this contract does not attempt to
# resolve.
[[tool.importlinter.contracts]]
id = "er-errors-purity"
name = "ER shared exception vocabulary depends only on itself and the standard library"
type = "domain_purity"
domain_modules = ["finecode_extension_runner.er_errors"]

[tool.setuptools_scm]
version_file = "src/finecode_extension_runner/_version.py"
root = ".."

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

[tool.finecode.action.get_src_artifact_version]
source = "fine_src_artifacts.GetSrcArtifactVersionAction"
handlers_mode = "replace"
handlers = [
    { name = 'get_src_artifact_version_setuptools_scm', source = 'fine_python_setuptools_scm.GetSrcArtifactVersionSetuptoolsScmHandler', env = "dev_no_runtime", dependencies = [
        "fine_python_setuptools_scm~=0.1.0a1",
    ] },
]
